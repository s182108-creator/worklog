<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>작업일지 뷰어 (비고 확장형)</title>
    <style>
        :root { --bg-body: #f8f9fa; --bg-card: #ffffff; --text-main: #2c3e50; --border: #dee2e6; --accent: #e74c3c; }
        @media (prefers-color-scheme: dark) { :root { --bg-body: #121212; --bg-card: #1e1e1e; --text-main: #e0e0e0; --border: #333333; } }
        body { font-family: sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; padding: 15px; }
        .container { max-width: 1100px; margin: 0 auto; }
        
        .viewer-summary {
            background: #34495e; color: white; padding: 15px; border-radius: 12px;
            display: flex; justify-content: space-around; margin-bottom: 20px;
            position: sticky; top: 10px; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .sum-item { text-align: center; flex: 1; }
        .sum-label { font-size: 11px; opacity: 0.8; }
        .sum-value { font-size: 1.2em; font-weight: bold; margin-top: 4px; }

        .table-wrapper { background: var(--bg-card); border-radius: 12px; overflow-x: auto; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: rgba(0,0,0,0.05); padding: 12px; font-size: 13px; border-bottom: 2px solid var(--border); text-align: left; }
        td { padding: 12px; font-size: 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
        
        .amt-text { color: #e67e22; font-weight: bold; }
        .my-biz-badge { background: var(--accent); color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        
        /* 🚀 비고 스타일 수정 */
        .note-text { 
            font-size: 12px; 
            color: #7f8c8d; 
            max-width: 200px; 
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }
        /* 줄임표 모드 */
        .note-truncate {
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
        }
        /* 전체 보기 모드 (클릭 시 적용) */
        .note-full {
            white-space: normal;
            overflow: visible;
            color: var(--text-main);
            background: rgba(231, 76, 60, 0.05); /* 클릭한 줄 강조 */
            border-radius: 4px;
        }
        
        #loader { text-align: center; padding: 50px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="viewer-summary">
        <div class="sum-item"><div class="sum-label">총 작업 매출</div><div id="vTotal" class="sum-value">0원</div></div>
        <div class="sum-item" style="border-left: 1px solid rgba(255,255,255,0.2);">
            <div class="sum-label">월급 자동계산</div>
            <div id="vShare" class="sum-value" style="color: #f1c40f;">0원</div>
        </div>
    </div>

    <div class="table-wrapper">
        <table id="logTable">
            <thead>
                <tr>
                    <th>날짜</th>
                    <th>개인 오더</th>
                    <th>업체명</th>
                    <th>금액</th>
                    <th>작업자</th>
                    <th>장소</th>
                    <th>유형</th>
                    <th>비고 (클릭 시 전체보기)</th>
                </tr>
            </thead>
            <tbody id="viewerList"></tbody>
        </table>
        <div id="loader">데이터를 불러오는 중...</div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwykn8FjDC-Gewv-0UlDRP5rV3eoTjEJBEFcH7n6aYNIWiA-8L--UetOJirizeq5iVM/exec";

    function fixDate(d) {
        if (!d) return "";
        let date = new Date(d);
        if (isNaN(date.getTime())) return String(d).split('T')[0];
        return `${date.getFullYear()}-${("0"+(date.getMonth()+1)).slice(-2)}-${("0"+date.getDate()).slice(-2)}`;
    }

    // 🚀 비고 클릭 이벤트 함수
    function toggleNote(el) {
        el.classList.toggle('note-truncate');
        el.classList.toggle('note-full');
    }

    async function loadForViewer() {
        try {
            const resp = await fetch(`${API_URL}?t=${Date.now()}`);
            const data = await resp.json();
            const list = document.getElementById('viewerList');
            document.getElementById('loader').style.display = 'none';
            list.innerHTML = '';

            let totalSales = 0;
            let totalMyPay = 0;

            data.sort((a,b) => new Date(fixDate(a.date)) - new Date(fixDate(b.date))).forEach(d => {
                const amt = parseInt(String(d.amount).replace(/,/g, '')) || 0;
                const isMyBiz = d.myBiz === true || d.myBiz === "true";
                
                totalSales += amt;
                if (isMyBiz) { totalMyPay += (amt * 0.1) + (amt * 0.4); } 
                else { totalMyPay += (amt * 0.4); }

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${fixDate(d.date)}</td>
                    <td>${isMyBiz ? '<span class="my-biz-badge">10%대상</span>' : '-'}</td>
                    <td>${d.company || '-'}</td>
                    <td class="amt-text">${amt.toLocaleString()}원</td>
                    <td>${d.worker || '-'}</td>
                    <td>${d.location || '-'}</td>
                    <td>${d.type || '-'}</td>
                    <td class="note-text note-truncate" 
                        title="${d.note || ''}" 
                        onclick="toggleNote(this)">
                        ${d.note || '-'}
                    </td>
                `;
                list.appendChild(row);
            });

            document.getElementById('vTotal').innerText = totalSales.toLocaleString() + "원";
            document.getElementById('vShare').innerText = Math.floor(totalMyPay).toLocaleString() + "원";

        } catch(e) {
            document.getElementById('loader').innerText = "❌ 데이터를 가져오는데 실패했습니다.";
        }
    }

    document.addEventListener('DOMContentLoaded', loadForViewer);
</script>
</body>
</html>
