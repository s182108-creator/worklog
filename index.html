<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>클라우드 작업일지 V14.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --bg-body: #f1f2f6; --bg-card: #ffffff; --text-main: #2c3e50; --accent: #3498db; --border: #dcdde1; }
        @media (prefers-color-scheme: dark) { :root { --bg-body: #181a1b; --bg-card: #242729; --text-main: #e8e6e3; --border: #3e4446; } }
        
        body { font-family: sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; padding: 15px; }
        .container { max-width: 900px; margin: 0 auto; background: var(--bg-card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* 요약 바: 모바일 고정 기능 */
        .summary-bar { display: flex; gap: 10px; margin-bottom: 15px; padding: 15px; background: #2980b9; color: white; border-radius: 10px; position: sticky; top: 10px; z-index: 100; }
        .summary-item { flex: 1; text-align: center; }
        .summary-label { font-size: 11px; opacity: 0.8; }
        .summary-value { font-size: 1.1em; font-weight: bold; margin-top: 3px; }

        .top-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; flex-grow: 1; font-size: 14px; }
        .btn-add { background: #3498db; }
        .btn-load { background: #34495e; }
        .btn-save { background: #2ecc71; }
        .btn-excel { background: #f39c12; }
        
        #loadingLayer { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.3); z-index:9999; justify-content:center; align-items:center; color:white; }

        /* 카드 디자인 */
        .log-card { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 15px; overflow: hidden; background: var(--bg-card); }
        .log-header { padding: 10px; background: rgba(0,0,0,0.05); display: flex; justify-content: space-between; }
        .log-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .field-group { display: flex; flex-direction: column; }
        .field-group label { font-size: 11px; color: #7f8c8d; margin-bottom: 4px; }
        input, textarea { padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-card); color: var(--text-main); font-size: 15px; }
        .full-width { grid-column: span 2; }
        .amount-input { border-color: #e67e22; color: #e67e22; font-weight: bold; }
    </style>
</head>
<body>

<div id="loadingLayer">☁️ 처리 중...</div>

<div class="container">
    <div class="summary-bar">
        <div class="summary-item">
            <div class="summary-label">총 작업 금액</div>
            <div id="totalAmountDisp" class="summary-value">0원</div>
        </div>
        <div class="summary-item">
            <div class="summary-label">수익 (40%)</div>
            <div id="myShareDisp" class="summary-value" style="color: #f1c40f;">0원</div>
        </div>
    </div>

    <div class="top-controls">
        <input type="date" id="mainDate" style="flex-grow: 2;">
        <button class="btn btn-add" onclick="addLog()">➕ 추가</button>
        <button class="btn btn-load" onclick="loadFromCloud()">🔄 불러오기</button>
        <button class="btn btn-save" onclick="saveToCloud(true)">💾 저장</button>
        <button class="btn btn-excel" onclick="exportEx()">📊 엑셀</button>
    </div>

    <div id="logList"></div>
</div>

<script>
    // ⚠️ 여기에 복사한 구글 배포 URL을 넣으세요!
    const API_URL = "https://script.google.com/macros/s/AKfycbwykn8FjDC-Gewv-0UlDRP5rV3eoTjEJBEFcH7n6aYNIWiA-8L--UetOJirizeq5iVM/exec";

    function updateTotal() {
        let total = 0;
        document.querySelectorAll('.amount-input').forEach(el => {
            total += parseInt(el.value.replace(/,/g, '')) || 0;
        });
        document.getElementById('totalAmountDisp').innerText = total.toLocaleString() + "원";
        document.getElementById('myShareDisp').innerText = Math.floor(total * 0.4).toLocaleString() + "원";
    }

    async function saveToCloud(manual) {
        const logs = Array.from(document.querySelectorAll('.log-card')).map(card => ({
            id: card.id.replace('card-',''),
            date: card.querySelector('.edit-date').value,
            worker: card.querySelector('.worker').value,
            company: card.querySelector('.company').value,
            amount: card.querySelector('.amount').value,
            location: card.querySelector('.location').value,
            type: card.querySelector('.type').value,
            m30: card.querySelector('.m30').value,
            direct: card.querySelector('.direct').checked,
            note: card.querySelector('.note').value,
            sign: card.querySelector('.sign-checkbox').checked
        }));

        document.getElementById('loadingLayer').style.display = 'flex';
        try {
            await fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "save", logs: logs }) });
            if(manual) alert("✅ 클라우드 동기화 완료");
        } catch(e) { alert("❌ 오류 발생"); }
        document.getElementById('loadingLayer').style.display = 'none';
    }

    async function loadFromCloud() {
        document.getElementById('loadingLayer').style.display = 'flex';
        try {
            const resp = await fetch(`${API_URL}?t=${Date.now()}`);
            const data = await resp.json();
            document.getElementById('logList').innerHTML = '';
            data.sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(d => addLog(d, true));
            updateTotal();
        } catch(e) { alert("❌ 불러오기 실패. 설정(Anyone)을 확인하세요."); }
        document.getElementById('loadingLayer').style.display = 'none';
    }

    function addLog(data = null, isLoad = false) {
        const id = data ? data.id : Date.now();
        const div = document.createElement('div');
        div.className = 'log-card';
        div.id = `card-${id}`;
        div.innerHTML = `
            <div class="log-header">
                <input type="date" class="edit-date" value="${data?.date || document.getElementById('mainDate').value}">
                <button onclick="document.getElementById('card-${id}').remove(); updateTotal();" style="border:none; background:none; color:red;">삭제</button>
            </div>
            <div class="log-grid">
                <div class="field-group"><label>작업자</label><input type="text" class="worker" value="${data?.worker || ''}"></div>
                <div class="field-group"><label>업체명</label><input type="text" class="company" value="${data?.company || ''}"></div>
                <div class="field-group"><label>금액</label><input type="text" class="amount amount-input" value="${data?.amount || ''}" oninput="updateTotal()" onblur="smartAmount(this)"></div>
                <div class="field-group"><label>장소</label><input type="text" class="location" value="${data?.location || ''}"></div>
                <div class="field-group"><label>유형</label><input type="text" class="type" value="${data?.type || ''}"></div>
                <div class="field-group"><label>30M</label><input type="text" class="m30" value="${data?.m30 || ''}"></div>
                <div class="field-group"><label>직수</label><input type="checkbox" class="direct" ${data?.direct ? 'checked' : ''}></div>
                <div class="field-group"><label>싸인</label><input type="checkbox" class="sign-checkbox" ${data?.sign ? 'checked' : ''}></div>
                <div class="field-group full-width"><label>비고</label><textarea class="note">${data?.note || ''}</textarea></div>
            </div>`;
        const list = document.getElementById('logList');
        isLoad ? list.appendChild(div) : list.insertBefore(div, list.firstChild);
        updateTotal();
    }

    function smartAmount(input) {
        let val = input.value.replace(/,/g, '');
        if (!val || isNaN(val)) return;
        let num = parseFloat(val);
        if (num > 0 && num < 1000) num *= 10000;
        input.value = num.toLocaleString();
        updateTotal();
    }

    function exportEx() {
        const rows = Array.from(document.querySelectorAll('.log-card')).map(card => ({
            "날짜": card.querySelector('.edit-date').value,
            "금액": card.querySelector('.amount').value,
            "비고": card.querySelector('.note').value
        }));
        const ws = XLSX.utils.json_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "일지");
        XLSX.writeFile(wb, `작업일지.xlsx`);
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('mainDate').value = new Date().toISOString().split('T')[0];
        loadFromCloud();
    });
</script>
</body>
</html>
